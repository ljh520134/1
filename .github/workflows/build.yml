name: build-dexkit-helper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2.1

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Extract classes.dex from APK (most stable)
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -type f -name "*.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            find app/build -maxdepth 8 -type f | head -n 200
            exit 1
          fi

          mkdir -p outDexRaw
          unzip -o "$APK_PATH" "classes.dex" -d outDexRaw
          cp outDexRaw/classes.dex dexkit-helper.dex
          ls -la dexkit-helper.dex

      - uses: actions/upload-artifact@v4
        with:
          name: dexkit-helper
          path: dexkit-helper.dex