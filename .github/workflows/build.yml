name: build-dexkit-helper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2.1

      - name: Build debug
        run: gradle :app:assembleDebug

      - name: Locate input for D8
        run: |
          # 先找 classes.jar
          JAR_PATH=$(find app/build -type f -name "classes.jar" | head -n 1)
          # 找不到就回退用 compileDebugJavaWithJavac 输出目录
          if [ -z "$JAR_PATH" ]; then
            JAR_PATH="app/build/intermediates/javac/debug/classes"
          fi

          echo "JAR_PATH=$JAR_PATH" >> $GITHUB_ENV
          echo "Using input: $JAR_PATH"

          if [ ! -e "$JAR_PATH" ]; then
            echo "Input not found: $JAR_PATH"
            find app/build -maxdepth 6 -type f | head -n 200
            exit 1
          fi

      - name: D8 to dex
        run: |
          mkdir -p outDex
          $ANDROID_HOME/build-tools/34.0.0/d8 "$JAR_PATH" --output outDex
          ls -la outDex

      - name: Rename dex
        run: |
          cp outDex/classes.dex dexkit-helper.dex
          ls -la dexkit-helper.dex

      - uses: actions/upload-artifact@v4
        with:
          name: dexkit-helper
          path: dexkit-helper.dex